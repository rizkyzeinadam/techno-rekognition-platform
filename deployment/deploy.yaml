apiVersion: v1
kind: Namespace
metadata:
  name: techno
  labels:
    app.kubernetes.io/part-of: techno-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: techno-app-sa
  namespace: techno
  labels:
    app.kubernetes.io/name: techno-backend
    app.kubernetes.io/part-of: techno-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techno-backend
  namespace: techno
  labels:
    app.kubernetes.io/name: techno-backend
    app.kubernetes.io/part-of: techno-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: techno-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: techno-backend
        app.kubernetes.io/part-of: techno-platform
    spec:
      serviceAccountName: techno-app-sa
      containers:
      - name: techno-backend
        image: 047646727992.dkr.ecr.us-east-1.amazonaws.com/techno-rekognition-app:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        - name: AWS_REGION
          value: us-east-1
        - name: PORT
          value: "5000"
        - name: FLASK_ENV
          value: production
        # Safe probes for Flask app that serves /health endpoint.
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          # Lightweight for t3.small single-node testing.
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techno-frontend
  namespace: techno
  labels:
    app.kubernetes.io/name: techno-frontend
    app.kubernetes.io/part-of: techno-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: techno-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: techno-frontend
        app.kubernetes.io/part-of: techno-platform
    spec:
      containers:
      - name: techno-frontend
        image: 047646727992.dkr.ecr.us-east-1.amazonaws.com/techno-rekognition-frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        - name: BACKEND_API_URL
          value: http://techno-backend-service.techno.svc.cluster.local:80
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
